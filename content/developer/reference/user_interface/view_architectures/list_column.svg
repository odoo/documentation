<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 225" width="660" height="225">
<defs>
  <pattern id="diagonalHatch" width="5" height="5" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="5" stroke="#cccccc" stroke-width="1"/>
  </pattern>
  <pattern id="stackedLine" width="700" height="44" patternUnits="userSpaceOnUse">
    <g transform="translate(0 0)" fill="none" stroke="#495057" stroke-width="1">
      <rect x="18" y="17" width="10" height="10"/>
      <rect x="40" y="6" rx="5" ry="5" width="260" height="14" stroke-dasharray="1.2 6"/>
      <rect x="330" y="6" rx="5" ry="5" width="200" height="14" stroke-dasharray="1.2 6"/>
      <rect x="330" y="24" rx="5" ry="5" width="200" height="14" stroke-dasharray="1.2 6"/>
    </g>
  </pattern>
</defs>
<g font-family="Arial" font-size="16px" direction="ltr" fill="none" stroke="#495057" stroke-width="0">
  <rect x="10" y="10" width="636" height="205" stroke-width="1"/>
  <rect x="10" y="10" width="636" height="25" fill="url(#diagonalHatch)" stroke-width="1"/>
  <rect x="17" y="17" width="10" height="10" stroke-width="1"/>
  <text x="40" y="28" fill="#495057">Name</text>
  <text x="330" y="28" fill="#495057">Contact</text>

  <rect transform="translate(0 35)" width="700" height="44" fill="url(#stackedLine)"/>
  <rect transform="translate(0 79)" width="700" height="44" fill="url(#stackedLine)"/>
  <rect transform="translate(0 123)" width="700" height="44" fill="url(#stackedLine)"/>
  <rect transform="translate(0 167)" width="700" height="44" fill="url(#stackedLine)"/>
</g>
</svg>
